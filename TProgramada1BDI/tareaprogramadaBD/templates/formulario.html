<!DOCTYPE html>
<html>
<head>
    <title>Insertar Empleado</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial;
            background: linear-gradient(135deg, #4facfe, #00f2fe, #43e97b);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 35px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.2s;
            font-size: 14px;
        }

        input:focus, select:focus {
            border-color: #4facfe;
            box-shadow: 0px 0px 6px rgba(79,172,254,0.5);
        }

        label {
            display: block;
            text-align: left;
            margin-top: 10px;
            font-size: 14px;
            color: #555;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #28a745;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background-color: #218838;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: 10px;
        }

        .btn-volver {
            margin-top: 10px;
            background-color: #6c757d;
        }

        .btn-volver:hover {
            background-color: #5a6268;
        }
    </style>
</head>

<body>

    <div class="card">
        
        <h1>Insertar Empleado</h1>

        <form action="/procesar" method="POST">

            <input type="text" name="nombre" placeholder="Nombre y apellidos" required>

            <input name="docIden" placeholder="Documento de identidad" required>

            <label for="puesto">Seleccione un puesto:</label>
            <select id="puesto" name="puesto" required>
                <option value="">==Seleccione==</option>
                {% for puesto in puestos %}
                    <option value="{{puesto[0]}}">{{puesto[1]}}</option>
                {% endfor %}
            </select>

            <p class="error">{{mensaje}}</p>

            <button type="submit">Registrar</button>

        </form>

        <button class="btn-volver" onclick="window.history.back()">Volver</button>

    </div>

</body>
</html>
