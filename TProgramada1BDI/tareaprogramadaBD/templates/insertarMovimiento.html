<!DOCTYPE html>
<html>
<head>
    <title>Insertar Movimiento</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial;
            background: linear-gradient(135deg, #4facfe, #00f2fe, #43e97b);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 15px;
            font-weight: 500;
            color: #555;
        }

        select, input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.2s;
        }

        select:focus, input:focus {
            border-color: #667eea;
            box-shadow: 0px 0px 5px rgba(102,126,234,0.5);
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #28a745;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background-color: #218838;
        }

        .btn-volver {
            background-color: #6c757d;
            margin-top: 10px;
        }

        .btn-volver:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>

<div class="card">

    <h2>Insertar Movimiento</h2>

    <form method="POST" action="/guardarMovimiento">

        <input type="hidden" name="IdEmpleado" value="{{ idEmpleado }}">

        <label>Tipo de Movimiento:</label>
        <select name="IdTipoMovimiento" required>
            {% for t in tipos %}
                <option value="{{ t[0] }}">{{ t[1] }}</option>
            {% endfor %}
        </select>

        <label>Monto:</label>
        <input type="number" name="Monto" required>

        <button type="submit">Guardar</button>

    </form>

    <button class="btn-volver" onclick="window.history.back()">Volver</button>

</div>

</body>
</html>
