<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login con fondo</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Cuadrado grande con imagen */
        .background-box {
            width: 600px;
            height: 400px;
            background-image: url("{{ url_for('static', filename='img/TEC-Cartago.jpg') }}");
            background-size: cover;
            background-position: center;
            position: relative;
            border-radius: 15px;
            overflow: hidden;
        }

        /* Login encima */
        .login-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 10px;
            width: 250px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #60a6f1;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

<div class="background-box">
    <div class="login-container">
        <h2>Login</h2>
        <form action="/login" method="POST">
            <input type="text" name="Username" placeholder="Username" required>
            <input type="password" name="Password" placeholder="Password" required>
            <h3 style="color:red; text-align:center;">{{ mensaje }}</h3>
            <button type="submit">Entrar</button>
        </form>
    </div>
</div>

</body>
</html>
